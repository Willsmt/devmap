<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>devmaps · roadmaps interativos para devs</title>
    <link rel="stylesheet" href="./core/widget.css" />
  </head>
  <body>
    <div class="container">
      <header class="home-header">
        <h1>devmaps</h1>
        <p>Roadmaps interativos para acompanhar sua evolução como dev.</p>
      </header>

      <div class="roadmap-list" id="list">
        <div class="loading"><div class="spinner"></div>Carregando roadmaps…</div>
      </div>

      <footer class="site-footer">
        Open source · faça fork e crie o seu ·
        <a href="https://github.com">contribua</a>
      </footer>
    </div>

    <!--
      Sites estáticos não conseguem listar pastas sozinhos, então mantemos um
      registro explícito das pastas de roadmap. O título e o subtítulo vêm do
      config.js de cada roadmap (fonte única). Adicionar um roadmap à home =
      acrescentar uma string a este array.
    -->
    <script type="module">
      const ROADMAPS = ['arquitetura-software', 'arquitetura-software-ia', 'python-do-zero'];

      const list = document.getElementById('list');

      const cards = await Promise.all(
        ROADMAPS.map(async (slug) => {
          try {
            const { default: config } = await import(`./roadmaps/${slug}/config.js`);
            return card(slug, config);
          } catch {
            return card(slug, { title: slug, subtitle: 'Roadmap indisponível.' });
          }
        })
      );

      list.innerHTML = cards.join('') || '<p class="notice">Nenhum roadmap ainda.</p>';

      // Cada card herda a identidade visual do próprio roadmap: a cor de acento
      // do theme (ou um gradiente em cardGradient) tinge a barra lateral, o
      // título e o brilho do hover. Assim dá para "sentir" a customização já na
      // home, sem precisar entrar no roadmap.
      function card(slug, config) {
        const title = config.title || slug;
        const subtitle = config.subtitle || '';
        const accent = config.cardAccent || (config.theme && config.theme.accent) || '';
        const gradient = config.cardGradient || '';
        const vars = [
          accent && `--card-accent:${accent}`,
          gradient && `--card-gradient:${gradient}`,
        ]
          .filter(Boolean)
          .join(';');
        const cls = 'roadmap-card' + (gradient ? ' roadmap-card--gradient' : '');
        return `<a class="${cls}" href="./roadmaps/${slug}/index.html"${
          vars ? ` style="${vars}"` : ''
        }>
            <h2>${title}</h2>
            <p>${subtitle}</p>
          </a>`;
      }
    </script>
  </body>
</html>
